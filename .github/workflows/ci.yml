# Goal - I have to Lint, Build, Test the code for Frontend & Backend
# then Push the images to DockerHub 
name: CI

on: 
    push:
        branches: [advanced]

jobs:
    frontend:
        # Github runner
        runs-on: ubuntu-20.04
        steps:
          # getting github code locally on ubuntu runner
            - name: Checkout Code
              uses: actions/checkout@v7
          # Installing NodeJs on ubuntu runner for Lint
            - name: Setup NodeJs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            # This step will install all the npm packages for frontend and then run the linter and tests
            - name: Install npm Packages
              run: npm install
              working-directory: frontend
            # This step will run the linter for the frontend code
            - name: Run Linter
              run: npm run lint
              working-directory: frontend
            # This step will run the tests for the frontend code
            - name: Run Tests
              run: npm run test 
              working-directory: frontend
            # This step will run the build for the frontend code
            - name: Docker Setup [Login]
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            # This step will build the docker image for the frontend code and push it to DockerHub
            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                context: ./frontend
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest
                
    backend:
        # Github runner
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7
            # This step will setup Go environment for the backend code
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version: '1.23'
                go-version-file: 'go.mod'
                cache-dependency-path: go.sum
            # This step will run the Go formatter for the backend code
            - name: Run Go Formatter
              run: go fmt
              working-directory: backend
            # This step will run the Go linter for the backend code
            - name: Run Go Vet
              run: go vet
              working-directory: backend
            # This step will run the Go tests for the backend code
            - name: Run Tests
              run: go test 
              working-directory: backend
            # This step will build the docker image for the backend code and push it to DockerHub
            - name: Docker Setup [Login]
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            # This step will build the docker image for the backend code and push it to DockerHub
            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                context: ./backend
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest
    deploy:
        needs: [frontend,backend]
        uses: ./.github/workflows/cd.yml
        secrets: inherit